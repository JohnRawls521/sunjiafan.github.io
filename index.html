<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunjiafan - 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #2d3748;
        }
        
        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .description {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        a:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sunjiafan</h1>
        <div class="subtitle">Developer & Designer</div>
        
        <p class="description">
            欢迎来到我的个人主页。<br>
            这里记录我的技术探索与创意实践。
        </p>
        
        <div class="links">
            <a href="https://github.com/JohnRawls521" target="_blank">GitHub</a>
            <a href="mailto:your.email@example.com">联系我</a>
        </div>
        
        <footer>
            &copy; 2026 Sunjiafan. All rights reserved.
        </footer>
    </div>
</body>
</html>
